server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ID}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}

  # 파일 업로드 용량 설정 (테스트 영상 업로드용 50MB)
  # 실제 운영 환경에선 500MB로 늘릴 예정
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET}
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}          # REST API 키
    redirect-uri: ${KAKAO_REDIRECT_URI}
    authorization-uri: ${KAKAO_AUTHORIZATION_URI}
    token-uri: ${KAKAO_TOKEN_URI}
    user-info-uri: ${KAKAO_USERINFO_URI}
    app-deep-link-uri: ${KAKAO_APP_DEEPLINK_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
    authorization-uri: ${GOOGLE_AUTHORIZATION_URI}
    token-uri: ${GOOGLE_TOKEN_URI}
    user-info-uri: ${GOOGLE_USERINFO_URI}
    app-deep-link-uri: ${GOOGLE_APP_DEEPLINK_URI}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
    authorization-uri: ${NAVER_AUTHORIZATION_URI}
    token-uri: ${NAVER_TOKEN_URI}
    user-info-uri: ${NAVER_USERINFO_URI}
    app-deep-link-uri: ${NAVER_APP_DEEPLINK_URI}

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 1209600000

app:
  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true

  discovery:
    search:
      provider: serper
      serper:
        base-url: https://google.serper.dev/search
        api-key: ${SERPER_API_KEY:}
        gl: kr
        hl: ko
    publish:
      fixed-delay-ms: 300000
    sheets:
      enabled: false
      spreadsheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID:}
      sheet-name: Discovery
      credentials-path: ${GOOGLE_SHEETS_CREDENTIALS_PATH:}
      credentials-json: ${GOOGLE_SHEETS_CREDENTIALS_JSON:}
