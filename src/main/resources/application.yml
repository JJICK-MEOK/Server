spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ID}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}

  # 파일 업로드 용량 설정 (테스트 영상 업로드용 50MB)
  # 실제 운영 환경에선 500MB로 늘릴 예정
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  #AWS S3 설정
  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET}
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}


oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}          # REST API 키
    redirect-uri: "{baseUrl}/api/v2/oauth2/code/kakao"
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: "{baseUrl}/api/v2/oauth2/code/google"

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 1209600000

app:
  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true

